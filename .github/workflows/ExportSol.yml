name: powerplatform-export-import-solution

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: "Solution unique name"
        required: true
        default: "SingaporeNricFinSolution"
      import_unmanaged:
        description: "Import unmanaged to target environment?"
        required: true
        default: "true"
      import_managed:
        description: "Import managed to target environment?"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  export:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform Tools (PAC CLI)
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Export solution (unmanaged)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.SOURCE_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: ${{ inputs.solution_name }}
          managed: false
          solution-output-file: "${{ inputs.solution_name }}_unmanaged.zip"
          working-directory: out

      - name: Export solution (managed)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.SOURCE_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: ${{ inputs.solution_name }}
          managed: true
          solution-output-file: "${{ inputs.solution_name }}_managed.zip"
          working-directory: out

      - name: Unpack solution (unmanaged)
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: "out/${{ inputs.solution_name }}_unmanaged.zip"
          solution-folder: "out/solutions/${{ inputs.solution_name }}"
          solution-type: Unmanaged
          overwrite-files: true

      - name: Copy unpacked solution into repo folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "solutions\${{ inputs.solution_name }}" | Out-Null
          Copy-Item -Recurse -Force "out\solutions\${{ inputs.solution_name }}\*" "solutions\${{ inputs.solution_name }}\"

      - name: Commit unpacked solution changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add solutions/
          git commit -m "Export solution ${{ inputs.solution_name }}" || echo "No changes to commit"
          git push || echo "No push (detached HEAD or insufficient permissions)"

      - name: Upload exported zips
        uses: actions/upload-artifact@v4
        with:
          name: exported-solution-zips
          path: |
            out/${{ inputs.solution_name }}_unmanaged.zip
            out/${{ inputs.solution_name }}_managed.zip

  import:
    runs-on: windows-latest
    needs: export
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform Tools (PAC CLI)
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Download exported zips
        uses: actions/download-artifact@v4
        with:
          name: exported-solution-zips
          path: out

      - name: Import unmanaged
        if: ${{ inputs.import_unmanaged == 'true' }}
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.TARGET_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: "out/${{ inputs.solution_name }}_unmanaged.zip"
          force-overwrite: true
          publish-changes: true

      - name: Import managed
        if: ${{ inputs.import_managed == 'true' }}
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.TARGET_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: "out/${{ inputs.solution_name }}_managed.zip"
          force-overwrite: true
          publish-changes: true
