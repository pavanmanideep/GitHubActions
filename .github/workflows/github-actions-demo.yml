name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."

  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install PAC CLI and resolve path
        shell: bash
        run: |
          dotnet tool install Microsoft.PowerApps.CLI.Tool --tool-path "$GITHUB_WORKSPACE/.pac"
          pac_bin=$(find "$GITHUB_WORKSPACE/.pac" -maxdepth 1 -type f \( -name pac -o -name pac.exe \) | head -n 1)

          if [ -z "$pac_bin" ]; then
            echo "PAC binary was not found in $GITHUB_WORKSPACE/.pac"
            exit 1
          fi

          chmod +x "$pac_bin" || true
          echo "PAC_BIN=$pac_bin" >> "$GITHUB_ENV"
          "$pac_bin" --version

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1.9.1
        with:
          use-preinstalled-pac: ${{ env.PAC_BIN }}

      - name: Export Solution
        uses: microsoft/powerplatform-actions/export-solution@v1.9.1
        with:
          environment-url: 'https://ecellorsdev.crm8.dynamics.com'
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: Sitemap
          solution-output-file: 'out/Sitemap.zip'
          working-directory: 'out'

      - name: Unpack Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1.9.1
        with:
          solution-file: 'out/Sitemap.zip'
          solution-folder: 'out/solutions/Sitemap'
          solution-type: 'Unmanaged'
          overwrite-files: true

      - name: Publish Solution
        uses: microsoft/powerplatform-actions/publish-solution@v1.9.1
        with:
          environment-url: 'https://ecellorsdev.crm8.dynamics.com'
          app-id: ${{ secrets.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}

      - name: Prepare solution changes for check-in into source control
        uses: microsoft/powerplatform-actions/branch-solution@v1.9.1
        with:
          solution-folder: 'out/solutions/Sitemap'
          solution-target-folder: 'src/solutions/Sitemap'
          repo-token: ${{ secrets.GITHUB_TOKEN }}


